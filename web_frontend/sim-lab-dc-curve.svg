<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="DC motor speed torque curve">
  <style>
    .axis { stroke: #111111; stroke-width: 5; stroke-linecap: round; }
    .curve { stroke: #111111; stroke-width: 6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .grid { stroke: #d4d4d4; stroke-width: 2; }
    .title { fill: #111111; font: 28px Arial, sans-serif; font-weight: 700; }
    .label { fill: #111111; font: 20px Arial, sans-serif; }
    .note { fill: #444444; font: 18px Arial, sans-serif; }
  </style>

  <g>
    <line class="grid" x1="140" y1="120" x2="790" y2="120"/>
    <line class="grid" x1="140" y1="190" x2="790" y2="190"/>
    <line class="grid" x1="140" y1="260" x2="790" y2="260"/>
    <line class="grid" x1="140" y1="330" x2="790" y2="330"/>
    <line class="grid" x1="140" y1="400" x2="790" y2="400"/>
  </g>

  <line class="axis" x1="140" y1="400" x2="790" y2="400"/>
  <line class="axis" x1="140" y1="400" x2="140" y2="86"/>
  <polyline class="curve" points="140,126 230,152 320,180 410,212 500,246 590,282 680,316 790,350"/>
  <circle cx="140" cy="126" r="7" fill="#111111"/>
  <circle cx="790" cy="350" r="7" fill="#111111"/>

  <text class="title" x="246" y="64">DC Motor Speed-Torque</text>
  <text class="label" x="88" y="92">n (r/min)</text>
  <text class="label" x="712" y="438">Torque T (N·m)</text>
  <text class="note" x="154" y="116">No-load speed</text>
  <text class="note" x="688" y="378">Near stall</text>
  <text class="note" x="220" y="474">Higher load torque leads to lower speed.</text>
</svg>
