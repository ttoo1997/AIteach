<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Approximate induction motor per-phase equivalent circuit">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <style>
      .wire{stroke:#1f5cae;stroke-width:6;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .title{fill:#1f4f97;font:28px 'Noto Sans SC',sans-serif}
      .text{fill:#2f6ec8;font:22px 'Noto Sans SC',sans-serif}
      .note{fill:#476892;font:20px 'Noto Sans SC',sans-serif}
    </style>
  </defs>
  <rect x="10" y="10" width="880" height="500" rx="24" fill="url(#bg)" stroke="#d7e6ff"/>

  <line class="wire" x1="110" y1="120" x2="790" y2="120"/>
  <line class="wire" x1="110" y1="400" x2="790" y2="400"/>
  <line class="wire" x1="110" y1="120" x2="110" y2="400"/>

  <circle cx="110" cy="260" r="54" fill="#fff" stroke="#1f5cae" stroke-width="6"/>
  <text class="title" x="92" y="272">~</text>
  <text class="text" x="78" y="194">V1</text>

  <line class="wire" x1="255" y1="120" x2="255" y2="190"/>
  <polyline class="wire" points="255,190 280,215 230,240 280,265 230,290 280,315 255,340"/>
  <line class="wire" x1="255" y1="340" x2="255" y2="400"/>
  <text class="text" x="294" y="262">R1</text>

  <line class="wire" x1="390" y1="120" x2="390" y2="175"/>
  <path class="wire" d="M365 175q25 25 0 50q25 25 0 50q25 25 0 50"/>
  <line class="wire" x1="390" y1="325" x2="390" y2="400"/>
  <text class="text" x="424" y="258">jX1</text>

  <line class="wire" x1="510" y1="120" x2="510" y2="400"/>

  <line class="wire" x1="510" y1="120" x2="510" y2="170"/>
  <polyline class="wire" points="510,170 535,195 485,220 535,245 485,270 535,295 510,320"/>
  <line class="wire" x1="510" y1="320" x2="510" y2="400"/>
  <text class="text" x="548" y="262">Rc</text>

  <line class="wire" x1="615" y1="120" x2="615" y2="175"/>
  <path class="wire" d="M590 175q25 25 0 50q25 25 0 50q25 25 0 50"/>
  <line class="wire" x1="615" y1="325" x2="615" y2="400"/>
  <text class="text" x="648" y="258">jXm</text>

  <line class="wire" x1="390" y1="120" x2="760" y2="120"/>
  <line class="wire" x1="760" y1="120" x2="760" y2="175"/>
  <polyline class="wire" points="760,175 785,200 735,225 785,250 735,275 785,300 760,325"/>
  <line class="wire" x1="760" y1="325" x2="760" y2="350"/>
  <path class="wire" d="M735 350q25 25 0 50"/>
  <path class="wire" d="M760 350q25 25 0 50"/>
  <path class="wire" d="M785 350q25 25 0 50"/>
  <text class="text" x="796" y="236">R2'/s</text>
  <text class="text" x="796" y="390">jX2'</text>

  <text class="title" x="162" y="70">异步电机每相近似等效电路（折算到定子侧）</text>
  <text class="note" x="208" y="446">励磁支路采用 Rc 与 jXm 并联，转子支路为 R2'/s 与 jX2'</text>
  <text class="note" x="280" y="476">教学实验重点观察：滑差 s 改变时，转子支路等效电阻随之变化</text>
</svg>
